
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage-Me</title>
    <link rel="preload" href="https://cdn.jsdelivr.net/gh/manthib/Typhaine@master/Site/maheer/assets/font/KohinoorBangla-Regular.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Kohinoor Bangla"', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        /* Force Light Mode for Form Elements */
        :root {
            color-scheme: light;
        }
        
        body {
            font-family: 'Kohinoor Bangla', sans-serif !important;
            background-color: #f8fafc;
            /* Disable native overscroll bounce (rubber-banding) on Android WebView and iOS */
            overscroll-behavior-y: none;
            overscroll-behavior: none;
        }
        
        /* Ensure inputs always render in light mode (fixes mobile dark mode issues) */
        input, select, textarea {
            color-scheme: light;
        }

        .bg-brand-purple { background-color: #6366f1; }
        .text-brand-purple { color: #6366f1; }
        .border-brand-purple { border-color: #6366f1; }
        
        /* Date picker icon visibility improvement */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.4);
            transition: filter 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            filter: invert(0.2);
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        html {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
            overscroll-behavior-y: none;
            overscroll-behavior: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",

  }
}
</script>

    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <div id="root"></div>
    <script>
      (function() {
        let startY = 0;
        
        document.addEventListener('touchstart', function(e) {
          if (e.touches.length === 1) {
            startY = e.touches[0].clientY;
          }
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
          if (e.touches.length === 1) {
            const clientY = e.touches[0].clientY;
            const deltaY = clientY - startY;

            if (deltaY > 0) {
              // User is pulling down
              // Find if there is any active scrollable container that is scrolled down
              let target = e.target;
              let canScrollUp = false;

              while (target && target !== document.body && target !== document.documentElement) {
                const overflow = window.getComputedStyle(target).overflowY;
                if ((overflow === 'auto' || overflow === 'scroll') && target.scrollTop > 0) {
                  canScrollUp = true;
                  break;
                }
                const parent = target.parentNode;
                if (parent && parent instanceof Element) {
                  target = parent;
                } else {
                  break;
                }
              }

              // If we are at the very top of the window, and no child container can scroll up,
              // then prevent the browser's/WebView's pull-to-refresh / rubber-band bounce.
              if (window.scrollY === 0 && !canScrollUp) {
                e.preventDefault();
              }
            } else if (deltaY < 0) {
              // User is pulling up
              // Check if we are at the bottom of the window
              const maxWindowScroll = document.documentElement.scrollHeight - window.innerHeight;
              let target = e.target;
              let canScrollDown = false;

              while (target && target !== document.body && target !== document.documentElement) {
                const overflow = window.getComputedStyle(target).overflowY;
                const scrollRange = target.scrollHeight - target.clientHeight;
                if ((overflow === 'auto' || overflow === 'scroll') && target.scrollTop < scrollRange) {
                  canScrollDown = true;
                  break;
                }
                const parent = target.parentNode;
                if (parent && parent instanceof Element) {
                  target = parent;
                } else {
                  break;
                }
              }

              if (window.scrollY >= maxWindowScroll - 1 && !canScrollDown) {
                e.preventDefault();
              }
            }
          }
        }, { passive: false });
      })();
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
